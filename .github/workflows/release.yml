name: Release

on:
  push:
    branches: [main]
    paths: ["skills/**", "CITATION.cff", "README.md"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Bump patch version
        id: bump
        run: |
          OLD=$(grep -oP '^version: "\K[^"]+' CITATION.cff)
          NEW=$(echo "$OLD" | awk -F. '{print $1"."$2"."$3+1}')
          sed -i "s/^version: .*/version: \"$NEW\"/" CITATION.cff
          sed -i "s/^date-released: .*/date-released: \"$(date -u +%F)\"/" CITATION.cff
          sed -i "s/^  version: .*/  version: '$NEW'/" skills/gpu-brrr/SKILL.md
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: release v${{ steps.bump.outputs.new }} [skip ci]"
          git tag "v${{ steps.bump.outputs.new }}"
          git push origin main --tags
          gh release create "v${{ steps.bump.outputs.new }}" \
            --title "v${{ steps.bump.outputs.new }}" \
            --generate-notes
